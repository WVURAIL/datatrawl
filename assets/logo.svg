<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="datatrawl">
  <defs>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#123553"/>
      <stop offset="1" stop-color="#0a1b2e"/>
    </linearGradient>
    <linearGradient id="net" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7df0e6"/>
      <stop offset="1" stop-color="#34b8e0"/>
    </linearGradient>
    <radialGradient id="depth" cx="0.46" cy="0.52" r="0.55">
      <stop offset="0" stop-color="#2bd4d4" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#2bd4d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sheen" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- chip -->
  <rect x="0.75" y="0.75" width="118.5" height="118.5" rx="26" fill="url(#chip)" stroke="#4fd0e0" stroke-opacity="0.25" stroke-width="1.5"/>
  <rect x="0.75" y="0.75" width="118.5" height="118.5" rx="26" fill="url(#sheen)"/>
  <circle cx="55" cy="60" r="42" fill="url(#depth)"/>

  <!-- the sea of data: noisy samples drifting toward the mouth -->
  <g fill="#cdeff5">
    <circle cx="10" cy="40" r="2"   opacity="0.85"/>
    <circle cx="14" cy="52" r="1.6" opacity="0.7"/>
    <circle cx="9"  cy="62" r="1.4" opacity="0.6"/>
    <circle cx="16" cy="69" r="2.1" opacity="0.8"/>
    <circle cx="12" cy="79" r="1.5" opacity="0.65"/>
    <circle cx="19" cy="46" r="1.2" opacity="0.55"/>
    <circle cx="21" cy="60" r="2.2" opacity="0.9"/>
    <circle cx="8"  cy="55" r="1"   opacity="0.5"/>
  </g>

  <!-- the trawl net: a mesh funnel narrowing to the cod-end -->
  <g stroke="url(#net)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- silhouette -->
    <path d="M24 29 C 26.33 28.63, 28.66 28.26, 31 28 C 33.65 27.71, 36.33 27.57, 39 27.70 C 41.71 27.83, 44.41 28.24, 47 29 C 49.41 29.71, 51.72 30.73, 54 31.80 C 56.05 32.75, 58.07 33.74, 60 34.90 C 61.74 35.94, 63.41 37.12, 65 38.40 C 66.40 39.53, 67.74 40.73, 69 42 C 70.39 43.41, 71.69 44.91, 73 46.40 C 74.31 47.89, 75.62 49.38, 77 50.80 C 77.95 51.78, 78.93 52.74, 80 53.60 C 80.63 54.11, 81.30 54.59, 82 55 C 82.64 55.37, 83.32 55.69, 84 56" stroke-width="2"/>
    <path d="M24 91 C 26.33 91.37, 28.66 91.74, 31 92 C 33.65 92.29, 36.33 92.43, 39 92.30 C 41.71 92.17, 44.41 91.76, 47 91 C 49.41 90.29, 51.72 89.27, 54 88.20 C 56.05 87.25, 58.07 86.26, 60 85.10 C 61.74 84.06, 63.41 82.88, 65 81.60 C 66.40 80.47, 67.74 79.27, 69 78 C 70.39 76.59, 71.69 75.09, 73 73.60 C 74.31 72.11, 75.62 70.62, 77 69.20 C 77.95 68.22, 78.93 67.26, 80 66.40 C 80.63 65.89, 81.30 65.41, 82 65 C 82.64 64.63, 83.32 64.31, 84 64" stroke-width="2"/>
    <path d="M84 56 Q 88 60, 84 64" stroke-width="2"/>
    <!-- interior ribs -->
    <path d="M24 44 C 46 43, 66 53, 84 59" stroke-width="1.4" opacity="0.8"/>
    <path d="M24 60 C 45 60, 66 60, 84 60" stroke-width="1.4" opacity="0.8"/>
    <path d="M24 76 C 46 77, 66 67, 84 61" stroke-width="1.4" opacity="0.8"/>
    <!-- rings (mesh tightening toward the cod-end) -->
    <path d="M38 31 Q 43 60, 38 89" stroke-width="1.1" opacity="0.6"/>
    <path d="M52 37 Q 56 60, 52 83" stroke-width="1.1" opacity="0.6"/>
    <path d="M66 45 Q 70 60, 66 75" stroke-width="1.1" opacity="0.6"/>
    <path d="M78 51 Q 81 60, 78 68" stroke-width="1.1" opacity="0.6"/>
    <!-- faint diamond mesh -->
    <g opacity="0.3" stroke-width="0.9">
      <path d="M41 45 L 49 55"/><path d="M41 55 L 49 45"/>
      <path d="M68 53 L 76 59"/><path d="M68 59 L 76 53"/>
    </g>
  </g>

  <!-- bridge from cod-end to the catch -->
  <path d="M86 60 L 90 63" stroke="#7fd9c6" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>

  <!-- the catch: one narrow carrier hauled back, standing above the noise floor -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- noise floor with a little wobble -->
    <path d="M88 66 L 91 65 L 93 66 L 95 65.4 L 99 66 L 101 65.3 L 104 66"
          fill="none" stroke="#f0a93a" stroke-width="1.2" opacity="0.55"/>
    <!-- soft glow -->
    <path d="M96 66 L 96 40" fill="none" stroke="#fbbf24" stroke-width="6" opacity="0.16"/>
    <!-- the narrow line -->
    <path d="M94.4 66 L 96 40 L 97.6 66 Z" fill="#fbbf24"/>
  </g>
  <circle cx="96" cy="40" r="3.6" fill="#fbbf24" opacity="0.22"/>
  <circle cx="96" cy="40" r="1.7" fill="#ffe08a"/>
</svg>
