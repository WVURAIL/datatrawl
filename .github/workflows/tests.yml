name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest -q

  # The user-facing analyzer template lives in its own repository. This job
  # runs the template's smoke suite against THIS datatrawl checkout, so a
  # datatrawl change that breaks the template fails here, not months later in
  # the template.
  template-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: WVURAIL/datatrawl-analyzer-template
          path: template
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      # --no-deps so the template's pinned datatrawl tag does not shadow the
      # checkout under test.
      - run: pip install --no-deps -e ./template
      - run: pytest -q template/tests

  release-artifacts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m build
      - run: python -m twine check dist/*

      - name: Install and smoke-test the wheel outside the source tree
        shell: bash
        run: |
          python -m venv /tmp/datatrawl-wheel
          /tmp/datatrawl-wheel/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/datatrawl-wheel/bin/datatrawl --version
          /tmp/datatrawl-wheel/bin/datatrawl list
          /tmp/datatrawl-wheel/bin/python - <<'PY'
          from datatrawl.instruments import load_instrument

          inst = load_instrument("chime")
          assert inst.name == "chime"
          assert inst.nfft > 0
          PY

      - name: Verify the survey dependency contract
        run: |
          python -m pip install -e ".[survey,dev]"
          python - <<'PY'
          from datatrawl.plugins.sources._datatrail import Datatrail

          assert Datatrail.installed()
          ok, detail = Datatrail.api_available()
          assert ok, detail
          PY
